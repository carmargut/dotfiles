"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 8
truncate_to_repo = false
home_symbol = "~"
style = "bold cyan"
format = "[$path]($style) "

[git_branch]
symbol = ""
format = "on [$branch](bold #50fa7b) "

[git_status]
style = "bold red"
format = "([\\[$all_status$ahead_behind\\]]($style) )"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2000
format = "took [⏱ $duration](yellow) "

[character]
success_symbol = "[❯](bold green) "
error_symbol = "[❯](bold red) "

[nodejs]
symbol = "⬢ "
style = "bold green"
format = "via [$symbol($version)]($style) "

[python]
symbol = "🐍 "
style = "bold yellow"
format = "via [$symbol($version)]($style) "

[rust]
symbol = "🦀 "
style = "bold red"
format = "via [$symbol($version)]($style) "

[aws]
disabled = true

[gcloud]
disabled = true
