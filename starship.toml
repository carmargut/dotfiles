"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 4
truncate_to_repo = true

[git_branch]
symbol = " "

[git_status]
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2_000
format = " [$duration](yellow)"

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[nodejs]
symbol = " "

[python]
symbol = " "

[rust]
symbol = " "
